<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>日本語の道 — Mon Parcours Japonais</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --aka:#BC002D;--aka2:#E8002D;--aka-pale:#fce8ed;
  --sakura:#FFB7C5;--sakura2:#FF8FAB;--sakura-pale:#fff0f5;--sakura-deep:#e75480;
  --shiro:#fffef9;--kinari:#fdf6ee;--washi:#f5efe6;
  --sumi:#1a0a0a;--sumi2:#3d1515;--ink:#4a1515;
  --gold:#c9922a;--gold2:#e8b84b;
  --font-jp:'Noto Serif JP',serif;
  --font-title:'Kaisei Decol',serif;
  --font-body:'Noto Sans JP',sans-serif;
  --radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(188,0,45,.10);
  --shadow-sm:0 2px 8px rgba(188,0,45,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--shiro);
  color:var(--sumi);
  font-family:var(--font-body);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── BACKGROUND KANJI ─────────────────────────────────────── */
.bg-kanji{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
  user-select:none;
}
.bg-kanji span{
  position:absolute;
  font-family:var(--font-jp);
  font-weight:900;
  color:var(--aka);
  opacity:.035;
  line-height:1;
  transform-origin:center;
}

/* ─── SAKURA PETALS ─────────────────────────────────────────── */
.petals{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.petal{
  position:absolute;
  top:-30px;
  width:14px;height:14px;
  border-radius:0 100% 0 100%;
  background:linear-gradient(135deg,#ffd6e0,#ffb7c5);
  opacity:0;
  animation:fall linear infinite;
  filter:drop-shadow(0 1px 2px rgba(255,182,193,.5));
}
.petal::after{
  content:'';position:absolute;inset:0;
  border-radius:0 100% 0 100%;
  background:linear-gradient(135deg,rgba(255,255,255,.4),transparent);
}
@keyframes fall{
  0%{opacity:0;transform:translateY(0) rotate(0deg) scale(.8);}
  5%{opacity:.9;}
  90%{opacity:.6;}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg) scale(1.1);}
}

/* ─── LAYOUT ──────────────────────────────────────────────── */
.wrap{
  position:relative;z-index:2;
  max-width:900px;margin:0 auto;
  padding:0 16px 80px;
}

/* ─── HEADER ──────────────────────────────────────────────── */
header{
  position:relative;
  background:linear-gradient(135deg,#8b0000 0%,var(--aka) 40%,#d4003a 100%);
  padding:0;
  margin:0 -16px 0;
  overflow:hidden;
}
.hdr-inner{
  display:flex;align-items:center;
  gap:20px;padding:28px 24px 24px;
  position:relative;z-index:2;
}
.hdr-circle{
  width:64px;height:64px;
  background:white;border-radius:50%;
  flex-shrink:0;
  box-shadow:0 2px 20px rgba(0,0,0,.25);
  display:flex;align-items:center;justify-content:center;
}
.hdr-circle-inner{
  width:42px;height:42px;
  background:var(--aka);border-radius:50%;
}
.hdr-text{flex:1;}
.hdr-title{
  font-family:var(--font-title);
  font-size:clamp(22px,4vw,34px);
  color:white;
  font-weight:700;
  letter-spacing:.02em;
  line-height:1.1;
  text-shadow:0 2px 12px rgba(0,0,0,.3);
}
.hdr-kanji{
  font-family:var(--font-jp);
  font-size:clamp(28px,5vw,48px);
  color:rgba(255,255,255,.18);
  font-weight:900;
  position:absolute;right:24px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  letter-spacing:-.02em;
  line-height:1;
}
.hdr-sub{
  font-size:12px;color:rgba(255,255,255,.75);
  margin-top:4px;letter-spacing:.05em;font-weight:300;
}
/* Brush stroke bottom border */
header::after{
  content:'';
  display:block;height:8px;
  background:linear-gradient(90deg,var(--sakura2) 0%,var(--sakura) 40%,var(--sakura2) 70%,var(--sakura-deep) 100%);
}
/* Decorative top stripe */
header::before{
  content:'';
  display:block;height:4px;
  background:linear-gradient(90deg,var(--gold) 0%,var(--gold2) 50%,var(--gold) 100%);
}
.hdr-progress-bar{
  height:3px;
  background:rgba(255,255,255,.15);
  margin:0 24px;
  border-radius:2px;
  overflow:hidden;
}
.hdr-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold2),var(--gold));
  border-radius:2px;
  transition:width .5s ease;
}
.hdr-progress-label{
  display:flex;justify-content:space-between;
  padding:6px 24px 16px;
  font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.04em;
}

/* ─── NAVIGATION ──────────────────────────────────────────── */
nav{
  display:flex;gap:0;
  background:white;
  border-bottom:3px solid var(--aka);
  overflow-x:auto;
  box-shadow:0 2px 12px rgba(188,0,45,.08);
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none;}
.tab-btn{
  padding:14px 18px;
  border:none;
  background:transparent;
  color:var(--ink);
  cursor:pointer;
  font-size:13px;font-weight:500;
  font-family:var(--font-body);
  display:flex;align-items:center;gap:6px;
  position:relative;white-space:nowrap;
  transition:background .15s,color .15s;
}
.tab-btn:hover{background:var(--sakura-pale);}
.tab-btn.active{
  color:var(--aka);font-weight:700;
  background:var(--sakura-pale);
}
.tab-btn.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--sakura-deep),var(--aka));
  margin-bottom:-3px;
}

/* ─── CARDS ───────────────────────────────────────────────── */
.card{
  background:white;
  border:1px solid rgba(188,0,45,.1);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:12px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--sakura2),var(--aka));
  opacity:0;transition:opacity .2s;
}
.card:hover::before{opacity:1;}
.card-red{border-left:4px solid var(--aka);background:linear-gradient(135deg,white,var(--aka-pale));}
.card-sakura{background:linear-gradient(135deg,white,var(--sakura-pale));border-color:var(--sakura);}
.card-gold{border-left:4px solid var(--gold);background:linear(white,#fffbf0);}

/* ─── SECTION HEADERS ─────────────────────────────────────── */
.section-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;margin-top:8px;
}
.section-head h2{
  font-family:var(--font-title);
  font-size:20px;font-weight:700;
  color:var(--sumi);
}
.section-head .kanji-dec{
  font-family:var(--font-jp);
  font-size:32px;color:var(--sakura2);
  font-weight:900;opacity:.7;
  line-height:1;
}
.divider{
  height:2px;
  background:linear-gradient(90deg,var(--aka),var(--sakura),transparent);
  border:none;margin:20px 0;
  border-radius:1px;
}

/* ─── STATS ───────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat-box{
  background:linear-gradient(135deg,white,var(--sakura-pale));
  border:1px solid var(--sakura);
  border-radius:var(--radius);
  padding:16px;text-align:center;
  box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
}
.stat-box::after{
  content:attr(data-kanji);
  position:absolute;right:-4px;bottom:-8px;
  font-family:var(--font-jp);font-size:48px;font-weight:900;
  color:var(--sakura);opacity:.3;line-height:1;
  pointer-events:none;
}
.stat-num{
  font-family:var(--font-title);
  font-size:32px;font-weight:700;
  color:var(--aka);line-height:1;
}
.stat-lbl{font-size:11px;color:var(--ink);margin-top:5px;letter-spacing:.05em;font-weight:500;}

/* ─── PROGRESS BAR ────────────────────────────────────────── */
.pbar{height:8px;border-radius:4px;background:rgba(188,0,45,.1);overflow:hidden;margin:6px 0 14px;}
.pfill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--sakura-deep),var(--aka));
  transition:width .6s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.pfill::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:4px;
  background:rgba(255,255,255,.5);border-radius:2px;
}

/* ─── BADGES ──────────────────────────────────────────────── */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:4px;margin-bottom:4px;letter-spacing:.03em;}
.badge-red{background:var(--aka);color:white;}
.badge-sakura{background:var(--sakura);color:#5a0020;}
.badge-gold{background:var(--gold2);color:#3d2000;}
.badge-ink{background:var(--sumi);color:white;}
.badge-outline{background:transparent;border:1.5px solid var(--aka);color:var(--aka);}

/* ─── BUTTONS ─────────────────────────────────────────────── */
.btn{
  padding:8px 16px;border-radius:var(--radius-sm);
  border:1.5px solid rgba(188,0,45,.25);
  background:white;color:var(--ink);
  cursor:pointer;font-size:13px;
  font-family:var(--font-body);
  transition:all .15s;
}
.btn:hover{background:var(--sakura-pale);border-color:var(--sakura2);}
.btn-primary{
  padding:9px 20px;border-radius:var(--radius-sm);
  border:none;
  background:linear-gradient(135deg,var(--aka2),var(--aka));
  color:white;cursor:pointer;font-size:13px;font-weight:600;
  font-family:var(--font-body);
  box-shadow:0 3px 12px rgba(188,0,45,.3);
  transition:all .15s;
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 18px rgba(188,0,45,.4);
}
.btn-sakura{
  padding:8px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--sakura2);
  background:var(--sakura-pale);color:var(--sakura-deep);
  cursor:pointer;font-size:13px;font-family:var(--font-body);
  transition:all .15s;
}
.btn-sakura:hover{background:var(--sakura);color:white;}
.btn-sm{padding:5px 11px;font-size:12px;}

/* ─── INPUTS ──────────────────────────────────────────────── */
input[type=text],input[type=search],textarea,select{
  width:100%;padding:10px 14px;
  border-radius:var(--radius-sm);
  border:1.5px solid rgba(188,0,45,.2);
  background:white;color:var(--sumi);
  font-size:13px;font-family:var(--font-body);
  outline:none;transition:border .15s,box-shadow .15s;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--sakura2);
  box-shadow:0 0 0 3px rgba(255,143,171,.15);
}

/* ─── KANA GRID ───────────────────────────────────────────── */
.kana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.kana-cell{
  background:white;
  border:1.5px solid rgba(188,0,45,.12);
  border-radius:var(--radius-sm);
  padding:10px 4px;text-align:center;
  cursor:pointer;transition:all .15s;
  box-shadow:0 1px 4px rgba(188,0,45,.06);
}
.kana-cell:hover{background:var(--sakura-pale);border-color:var(--sakura2);transform:translateY(-2px);}
.kana-cell.sel{background:var(--aka);border-color:var(--aka);}
.kana-cell.sel .kana-jp{color:white;}
.kana-cell.sel .kana-rom{color:rgba(255,255,255,.75);}
.kana-jp{font-size:24px;font-family:var(--font-jp);display:block;color:var(--sumi);line-height:1.2;}
.kana-rom{font-size:11px;color:#888;display:block;margin-top:2px;}

/* ─── FLASHCARD ───────────────────────────────────────────── */
.flashcard-wrap{
  perspective:1000px;cursor:pointer;user-select:none;margin-bottom:12px;
}
.flashcard{
  min-height:220px;
  background:linear-gradient(135deg,white 60%,var(--sakura-pale));
  border:2px solid rgba(188,0,45,.15);
  border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;
  box-shadow:var(--shadow);
  transition:background .2s,transform .05s;
  position:relative;overflow:hidden;
}
.flashcard::before{
  content:attr(data-kanji);
  position:absolute;right:-10px;bottom:-15px;
  font-family:var(--font-jp);font-size:100px;font-weight:900;
  color:var(--sakura);opacity:.15;line-height:1;pointer-events:none;
}
.flashcard.flipped{background:linear-gradient(135deg,var(--sakura-pale),white);}
.fc-jp{font-family:var(--font-jp);font-size:52px;color:var(--sumi);line-height:1.1;margin-bottom:10px;}
.fc-fr{font-family:var(--font-title);font-size:24px;font-weight:700;color:var(--aka);margin-bottom:8px;}
.fc-sub{font-size:13px;color:#888;}
.fc-hint{font-size:11px;color:var(--sakura2);margin-top:12px;letter-spacing:.04em;}

/* ─── VOCAB ROWS ──────────────────────────────────────────── */
.vocab-card{
  background:white;
  border:1px solid rgba(188,0,45,.1);
  border-radius:var(--radius-sm);
  padding:12px 16px;
  margin-bottom:8px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  box-shadow:0 1px 4px rgba(188,0,45,.06);
  transition:all .15s;
}
.vocab-card:hover{border-color:var(--sakura2);transform:translateX(3px);}
.vocab-card.learned{opacity:.5;}
.vocab-jp{font-family:var(--font-jp);font-size:20px;font-weight:700;color:var(--sumi);min-width:80px;}
.vocab-rom{font-size:12px;color:#aaa;min-width:80px;}
.vocab-fr{font-size:13px;flex:1;color:var(--ink);}

/* ─── CHECKLIST ───────────────────────────────────────────── */
.check-group{
  background:white;border-radius:var(--radius);
  border:1px solid rgba(188,0,45,.1);
  overflow:hidden;margin-bottom:12px;
  box-shadow:var(--shadow-sm);
}
.check-head{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;
  background:linear-gradient(135deg,var(--aka) 0%,#d40035 100%);
  color:white;
}
.check-head-jp{font-family:var(--font-jp);font-size:22px;font-weight:900;opacity:.7;margin-left:auto;}
.check-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 18px;
  border-bottom:1px solid rgba(188,0,45,.07);
  cursor:pointer;transition:background .12s;
}
.check-item:last-child{border-bottom:none;}
.check-item:hover{background:var(--sakura-pale);}
.checkbox{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(188,0,45,.3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.checkbox.done{background:var(--aka);border-color:var(--aka);}
.check-label{font-size:13px;color:var(--ink);}
.check-label.done{text-decoration:line-through;color:#aaa;}

/* ─── TIMELINE ────────────────────────────────────────────── */
.tl-item{display:flex;gap:14px;margin-bottom:14px;}
.tl-dot{display:flex;flex-direction:column;align-items:center;}
.tl-circle{
  width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,var(--sakura2),var(--aka));
  flex-shrink:0;margin-top:6px;
  box-shadow:0 0 0 3px rgba(188,0,45,.15);
}
.tl-line{width:2px;flex:1;background:linear-gradient(180deg,var(--sakura),transparent);margin:3px 0;}

/* ─── MODULE ITEMS ────────────────────────────────────────── */
.module-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border:1.5px solid rgba(188,0,45,.1);border-radius:var(--radius-sm);
  margin-bottom:8px;cursor:pointer;
  background:white;transition:all .15s;
}
.module-item:hover{border-color:var(--sakura2);background:var(--sakura-pale);transform:translateX(4px);}
.module-icon{font-size:22px;flex-shrink:0;width:36px;text-align:center;}
.module-title{font-size:13px;font-weight:600;color:var(--sumi);}
.module-desc{font-size:12px;color:#888;margin-top:2px;}

/* ─── PDF VIEWER ──────────────────────────────────────────── */
.pdf-viewer-wrap{border:2px solid rgba(188,0,45,.15);border-radius:var(--radius);overflow:hidden;margin-top:14px;}
.pdf-viewer-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:linear-gradient(90deg,var(--aka),#d40035);
  color:white;
}
.pdf-viewer-bar span{font-size:13px;font-weight:600;}
iframe.pdf-frame{width:100%;height:640px;border:none;display:block;}

/* ─── FILTER BAR ──────────────────────────────────────────── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.filter-btn{
  padding:6px 13px;border-radius:20px;
  border:1.5px solid rgba(188,0,45,.2);
  background:white;color:var(--ink);
  cursor:pointer;font-size:12px;font-family:var(--font-body);
  transition:all .15s;font-weight:500;
}
.filter-btn:hover{background:var(--sakura-pale);}
.filter-btn.active{background:var(--aka);color:white;border-color:var(--aka);}

/* ─── TIP BOX ─────────────────────────────────────────────── */
.tip-box{
  background:linear-gradient(135deg,var(--sakura-pale),white);
  border:1.5px solid var(--sakura);border-radius:var(--radius-sm);
  padding:14px 18px;margin:12px 0;
  font-size:13px;line-height:1.8;color:var(--ink);
}
.tip-box strong{color:var(--aka);}

/* ─── ROADMAP ROWS ────────────────────────────────────────── */
.road-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px dashed rgba(188,0,45,.15);
}
.road-item:last-child{border-bottom:none;}
.road-period{
  min-width:80px;font-size:12px;font-weight:700;
  color:white;background:var(--aka);
  padding:3px 10px;border-radius:20px;text-align:center;
}

/* ─── METHOD ROWS ─────────────────────────────────────────── */
.method-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:12px 0;border-bottom:1px solid rgba(188,0,45,.08);
}
.method-icon{font-size:22px;margin-top:1px;width:28px;text-align:center;}
.method-label{font-size:13px;font-weight:700;color:var(--sumi);}
.method-desc{font-size:12px;color:#888;margin-top:2px;}

/* ─── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeSlideIn .3s ease forwards;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ─── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(3,1fr);}
  .hdr-kanji{display:none;}
  .tab-btn{padding:12px 13px;font-size:12px;}
}

/* ─── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--sakura-pale);}
::-webkit-scrollbar-thumb{background:var(--sakura2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--aka);}

/* ─── FOOTER SAKURA LINE ──────────────────────────────────── */
.sakura-line{
  text-align:center;font-family:var(--font-jp);font-size:18px;
  color:var(--sakura2);opacity:.5;padding:24px 0;
  letter-spacing:.2em;
}

/* ─── PDF FULLSCREEN ──────────────────────────────────────── */
.pdf-fs-overlay{
  position:fixed;inset:0;z-index:9999;
  background:#111;
  display:flex;flex-direction:column;
}
.pdf-fs-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:linear-gradient(90deg,#8b0000,var(--aka));
  flex-shrink:0;
}
.pdf-fs-bar span{font-family:var(--font-title);font-size:14px;font-weight:700;color:white;flex:1;}
.pdf-fs-frame{flex:1;border:none;width:100%;display:block;}

/* ─── QUIZ SYSTEM ─────────────────────────────────────────── */
.quiz-wrap{max-width:680px;margin:0 auto;}
.quiz-progress{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;
}
.quiz-progress-bar{
  flex:1;height:8px;border-radius:4px;
  background:rgba(188,0,45,.12);overflow:hidden;
}
.quiz-progress-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--sakura-deep),var(--aka));
  transition:width .4s ease;
}
.quiz-q-num{font-size:12px;font-weight:700;color:var(--aka);white-space:nowrap;}
.quiz-card{
  background:white;border:1.5px solid rgba(188,0,45,.12);
  border-radius:var(--radius);padding:24px;
  box-shadow:var(--shadow);margin-bottom:14px;
  position:relative;overflow:hidden;
}
.quiz-card::before{
  content:attr(data-kanji);

  color:var(--sakura);opacity:.12;pointer-events:none;line-height:1;
}
.quiz-question{
  font-family:var(--font-title);font-size:17px;font-weight:700;
  color:var(--sumi);line-height:1.5;margin-bottom:18px;
}
.quiz-jp{
  font-family:var(--font-jp);font-size:36px;
  color:var(--aka);text-align:center;display:block;
  margin-bottom:16px;
}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.quiz-choices{grid-template-columns:1fr;}}
.quiz-choice{
  padding:14px 16px;border-radius:var(--radius-sm);
  border:1.5px solid rgba(188,0,45,.18);
  background:white;color:var(--sumi);
  cursor:pointer;font-size:14px;font-family:var(--font-body);
  text-align:left;transition:all .15s;
  display:flex;align-items:center;gap:10px;
}
.quiz-choice:hover:not(:disabled){
  background:var(--sakura-pale);border-color:var(--sakura2);
  transform:translateY(-2px);box-shadow:0 4px 12px rgba(188,0,45,.1);
}
.quiz-choice .choice-jp{font-family:var(--font-jp);font-size:22px;color:var(--sumi);}
.quiz-choice.correct{background:#e8f5e9;border-color:#4caf50;color:#1b5e20;}
.quiz-choice.wrong{background:#fce8ed;border-color:var(--aka);color:var(--aka);}
.quiz-choice.reveal{background:var(--sakura-pale);border-color:var(--sakura);}
.quiz-choice:disabled{cursor:default;transform:none;}
.quiz-feedback{
  margin-top:14px;padding:12px 16px;border-radius:var(--radius-sm);
  font-size:13px;line-height:1.7;
  animation:fadeSlideIn .2s ease;
}
.quiz-feedback.ok{background:#e8f5e9;border-left:4px solid #4caf50;color:#1b5e20;}
.quiz-feedback.ko{background:var(--aka-pale);border-left:4px solid var(--aka);color:#5a0010;}
.quiz-next-btn{
  margin-top:14px;width:100%;padding:12px;
  background:linear-gradient(135deg,var(--sakura-deep),var(--aka));
  color:white;border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--font-body);transition:all .15s;
}
.quiz-next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(188,0,45,.3);}
.quiz-score-card{
  text-align:center;padding:40px 24px;
  background:linear-gradient(135deg,white,var(--sakura-pale));
  border:2px solid var(--sakura);border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.quiz-score-num{

  color:var(--aka);line-height:1;margin-bottom:8px;
}
.quiz-score-msg{font-size:15px;color:var(--ink);margin-bottom:20px;}
.quiz-score-jp{
  font-family:var(--font-jp);font-size:28px;
  color:var(--sakura2);margin-bottom:20px;display:block;
}
.quiz-module-btn{
  display:inline-flex;align-items:center;gap:6px;

  font-family:var(--font-body);margin-left:auto;

}
.quiz-module-btn:hover{background:var(--sakura-deep);}
.chapter-quiz-btn{
  width:100%;margin-top:14px;padding:14px;

}

// ═══════════════════════════════════════════════════════════
// INDEXEDDB — persistance des PDFs entre sessions
// ═══════════════════════════════════════════════════════════
const DB_NAME = 'JapaneseParcours', DB_VER = 1, DB_STORE = 'pdfs';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(DB_STORE))
        db.createObjectStore(DB_STORE, {keyPath:'id'});
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e);
  });
}
async function savePDF(id, name, arrayBuffer) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction([DB_STORE], 'readwrite');
    tx.objectStore(DB_STORE).put({id, name, data: arrayBuffer});
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function deletePDF(id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction([DB_STORE], 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function loadAllPDFs() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction([DB_STORE], 'readonly');
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}

function selectModule(id){ST.activeModule=id;render();}
function uploadPDF(id, input) {
  const f = input.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const buf = e.target.result;
    // Save to IndexedDB for persistence
    try { await savePDF(id, f.name, buf); } catch(err) { console.warn('IndexedDB save failed:', err); }
    // Create blob URL for current session display
    if (ST.pdfUrls[id]) URL.revokeObjectURL(ST.pdfUrls[id]);
    const blob = new Blob([buf], {type:'application/pdf'});
    ST.pdfUrls[id] = URL.createObjectURL(blob);
    ST.pdfUrls[id+'_name'] = f.name;
    ST.activeModule = id;
    render();
  };
  reader.readAsArrayBuffer(f);
}
async function removePDF(id) {
  try { await deletePDF(id); } catch(e) {}
  if (ST.pdfUrls[id]) URL.revokeObjectURL(ST.pdfUrls[id]);
  delete ST.pdfUrls[id]; delete ST.pdfUrls[id+'_name'];
  ST.activeModule = null; render();
}

        style="margin-bottom:10px;" onkeydown="if(event.key==='Enter')addTL()"/>
      <button class="btn-primary" onclick="addTL()">Enregistrer</button>
    </div>
    ${ST.timeline.length===0
      ?`<div style="text-align:center;padding:48px;color:#ccc;">
          <div style="font-family:var(--font-jp);font-size:48px;margin-bottom:10px;color:var(--sakura);">桜</div>
          <div>Aucune étape encore — commence et note tes victoires !</div>
        </div>`
      :[...ST.timeline].reverse().map((ev,i,arr)=>`
        <div class="tl-item">
          <div class="tl-dot">
            <div class="tl-circle"></div>
            ${i<arr.length-1?'<div class="tl-line"></div>':''}
          </div>
          <div class="card" style="flex:1;padding:12px 16px;margin-bottom:0;">
            <div style="font-size:11px;color:#aaa;margin-bottom:4px;">${ev.date}</div>
            <div style="font-size:14px;color:var(--ink);">${ev.text}</div>
          </div>
        </div>`).join('')
    }`;
}
function addTL(){
  const el=document.getElementById('tl-input');
  if(!el||!el.value.trim())return;
  ST.timeline.push({text:el.value.trim(),date:new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})});
  LS.set('timeline',ST.timeline);
  el.value='';render();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function esc(s){return (s||'').replace(/"/g,'&quot;');}


// ═══════════════════════════════════════════════════════════
// PDF FULLSCREEN
// ═══════════════════════════════════════════════════════════
function openFullscreen(modId) {
  const url = ST.pdfUrls[modId];
  if (!url) return;
  const name = ST.pdfUrls[modId+'_name'] || 'Cours PDF';
  const overlay = document.createElement('div');
  overlay.className = 'pdf-fs-overlay';
  overlay.id = 'pdf-fs-overlay';
  overlay.innerHTML = `
    <div class="pdf-fs-bar">
      <span>📄 ${name}</span>
      <button onclick="document.getElementById('pdf-fs-overlay').remove()" 
        style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;">
        ✕ Fermer
      </button>
      <button onclick="window.open('${url}','_blank')"
        style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;margin-left:6px;">
        ↗ Nouvel onglet
      </button>
    </div>
    <iframe class="pdf-fs-frame" src="${url}"></iframe>
  `;
  document.body.appendChild(overlay);
  // ESC to close
  const onKey = e => { if(e.key==='Escape'){overlay.remove();document.removeEventListener('keydown',onKey);} };
  document.addEventListener('keydown', onKey);
}

// ═══════════════════════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════════════════════
function startQuiz(id) {
  ST.quiz = {id, idx:0, answered:null, score:0, done:false};
  ST.tab = 'quiz';
  render();
}

function renderQuizMenu(c) {
  if (ST.quiz.id) { renderQuizActive(c); return; }
  const periods = [...new Set(MODULES.map(m=>m.period))];
  let html = `
    <div class="section-head"><span class="kanji-dec">試</span><h2>Quiz & Révisions</h2></div>
    <div class="card card-sakura" style="margin-bottom:16px;">
      <div style="font-size:13px;color:#666;line-height:1.7;">
        Teste tes connaissances après chaque cours. Les quiz sont disponibles module par module 
        ou en révision complète de chapitre. Ton score est sauvegardé.
      </div>
    </div>`;
  
  // Module quizzes
  for(const period of periods){
    const mods = MODULES.filter(m=>m.period===period);
    const jlpt = mods[0].jlpt;
    const cols={'N5':'#BC002D','N4':'#e8673a','N3':'#c9922a','N2':'#6b4fa0'};
    const col = cols[jlpt]||'#BC002D';
    html += `<div class="card" style="border-left:4px solid ${col};border-radius:0 var(--radius) var(--radius) 0;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-family:var(--font-title);font-size:15px;font-weight:700;">${period}</span>
        <span class="badge" style="background:${col};color:white;">${jlpt}</span>
      </div>
      ${mods.filter(m=>QUIZZES[m.id]).map(mod => {
        const sc = ST.quizScores[mod.id];
        const pct = sc ? Math.round(sc.score/sc.total*100) : null;
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(188,0,45,.08);">
          <span style="font-size:18px;">${mod.icon}</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;">${mod.title}</div>
            ${sc?`<div style="font-size:11px;color:#888;margin-top:2px;">Dernier score : ${sc.score}/${sc.total} (${pct}%) — ${pct>=80?'✓ Maîtrisé':'↺ À retravailler'}</div>`:'<div style="font-size:11px;color:#aaa;">Quiz non encore fait</div>'}
          </div>
          <button class="quiz-module-btn" onclick="startQuiz('${mod.id}')">🎯 ${sc?'Refaire':'Commencer'}</button>
        </div>`;
      }).join('')}
    </div>`;
  }
  
  // Chapter review
  const chSc = ST.quizScores['mois12'];
  html += `<div class="card" style="background:linear-gradient(135deg,white,#f3eeff);border:2px solid #9b59b6;margin-top:6px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div style="flex:1;">
        <div style="font-family:var(--font-title);font-size:16px;font-weight:700;color:#6b4fa0;">🌸 Révision Chapitre — Mois 1–2</div>
        <div style="font-size:13px;color:#888;margin-top:4px;">12 questions couvrant tous les modules du Mois 1–2</div>
        ${chSc?`<div style="font-size:12px;color:#6b4fa0;margin-top:4px;font-weight:600;">Dernier score : ${chSc.score}/${chSc.total} (${Math.round(chSc.score/chSc.total*100)}%)</div>`:''}
      </div>
      <button class="chapter-quiz-btn" style="width:auto;margin:0;" onclick="startQuiz('mois12')">
        🎯 ${chSc?'Refaire':'Commencer'}
      </button>
    </div>
  </div>`;
  
  c.innerHTML = html;
}

function renderQuizActive(c) {
  const qd = QUIZZES[ST.quiz.id];
  if (!qd) { ST.quiz.id=null; renderQuizMenu(c); return; }
  
  if (ST.quiz.done) { renderQuizScore(c, qd); return; }
  
  const q = qd.questions[ST.quiz.idx];
  const total = qd.questions.length;
  const pct = Math.round(ST.quiz.idx/total*100);
  const kanjis = '語学道心花愛試験問';
  const deco = kanjis[ST.quiz.idx % kanjis.length];
  
  let choicesHtml = q.choices.map((ch, i) => {
    let cls = 'quiz-choice';
    if (ST.quiz.answered !== null) {
      if (i === q.correct) cls += ' correct';
      else if (i === ST.quiz.answered && i !== q.correct) cls += ' wrong';
      else cls += ' reveal';
    }
    const hasJP = q.choices.every(c => /[\u3000-\u9fff\uff00-\uffef]/.test(c) || c.length <= 4);
    return `<button class="${cls}" ${ST.quiz.answered!==null?'disabled':''} onclick="answerQuiz(${i})">
      ${hasJP ? `<span class="choice-jp">${ch}</span>` : ch}
    </button>`;
  }).join('');
  
  let feedbackHtml = '';
  if (ST.quiz.answered !== null) {
    const ok = ST.quiz.answered === q.correct;
    feedbackHtml = `
      <div class="quiz-feedback ${ok?'ok':'ko'}">
        ${ok ? '✓ Correct !' : `✗ Incorrect — La bonne réponse est : <strong>${q.choices[q.correct]}</strong>`}<br>
        <span style="opacity:.85;">${q.exp}</span>
      </div>
      <button class="quiz-next-btn" onclick="nextQuestion()">
        ${ST.quiz.idx < total-1 ? 'Question suivante →' : 'Voir mon score 🌸'}
      </button>`;
  }
  
  c.innerHTML = `
    <div class="quiz-wrap">
      <button class="btn btn-sm" onclick="ST.quiz.id=null;render();" style="margin-bottom:14px;">← Retour aux quiz</button>
      
      <div class="quiz-progress">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <span class="quiz-q-num">${ST.quiz.idx+1} / ${total}</span>
      </div>
      
      <div style="font-family:var(--font-title);font-size:13px;color:var(--aka);margin-bottom:8px;font-weight:700;">
        ${qd.title}
      </div>
      
      <div class="quiz-card" data-kanji="${deco}">
        ${q.jp ? `<span class="quiz-jp">${q.jp}</span>` : ''}
        <div class="quiz-question">${q.q}</div>
        <div class="quiz-choices">${choicesHtml}</div>
        ${feedbackHtml}
      </div>
    </div>`;
}

function answerQuiz(idx) {
  if (ST.quiz.answered !== null) return;
  const qd = QUIZZES[ST.quiz.id];
  const q = qd.questions[ST.quiz.idx];
  ST.quiz.answered = idx;
  if (idx === q.correct) ST.quiz.score++;
  render();
}

function nextQuestion() {
  const qd = QUIZZES[ST.quiz.id];
  if (ST.quiz.idx >= qd.questions.length - 1) {
    ST.quiz.done = true;
    // Save score
    ST.quizScores[ST.quiz.id] = {score:ST.quiz.score, total:qd.questions.length, date:new Date().toLocaleDateString('fr-FR')};
    LS.set('quizScores', ST.quizScores);
  } else {
    ST.quiz.idx++;
    ST.quiz.answered = null;
  }
  render();
}

function renderQuizScore(c, qd) {
  const {score} = ST.quiz;
  const total = qd.questions.length;
  const pct = Math.round(score/total*100);
  const msgs = [
    [90,'Excellent ! 素晴らしい！','Maîtrise parfaite — tu peux passer au cours suivant.','🌸🌸🌸'],
    [70,'Très bien ! よくできました！','Bonne maîtrise — revois les points ratés.','🌸🌸'],
    [50,'Bien ! まあまあです。','Quelques lacunes — relis le cours et refais le quiz.','🌸'],
    [0,'À retravailler ! もう一度！','Revois le cours complet avant de refaire le quiz.','📖'],
  ];
  const [,title,advice,stars] = msgs.find(([min])=>pct>=min);
  
  c.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-score-card">
        <div style="font-size:48px;margin-bottom:8px;">${stars}</div>
        <div class="quiz-score-num">${score}/${total}</div>
        <div style="font-size:20px;font-weight:700;color:var(--aka);margin-bottom:6px;">${pct}%</div>
        <span class="quiz-score-jp">${title.split('！')[1] || '頑張りました！'}</span>
        <div class="quiz-score-msg">${title.split('！')[0]+' !'}<br>${advice}</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
          <button class="btn-primary" onclick="startQuiz('${ST.quiz.id}')">↺ Recommencer</button>
          <button class="btn" onclick="ST.quiz={id:null,idx:0,answered:null,score:0,done:false};render()">← Tous les quiz</button>
          ${ST.quiz.id!=='mois12'?`<button class="chapter-quiz-btn" style="width:auto;" onclick="startQuiz('mois12')">🌸 Quiz chapitre</button>`:''}
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// INIT — load saved PDFs then render
// ═══════════════════════════════════════════════════════════
(async function init() {
  try {
    const saved = await loadAllPDFs();
    for (const entry of saved) {
      const blob = new Blob([entry.data], {type:'application/pdf'});
      ST.pdfUrls[entry.id] = URL.createObjectURL(blob);
      ST.pdfUrls[entry.id+'_name'] = entry.name;
    }
    if (saved.length > 0) {
      // Show a subtle notification
      console.log(`✓ ${saved.length} PDF(s) restaurés depuis la mémoire locale`);
    }
  } catch(e) {
    console.warn('IndexedDB load failed:', e);
  }
  render();
})();
</script>
