  <!-- ─── SCRIPT DE DÉTECTION DE SERVICE WORKER ─── -->
  <script>
    // Vérifier si le navigateur supporte les service workers
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('✅ Service Worker enregistré :', registration);
            
            // Vérifier les mises à jour
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('🔄 Mise à jour disponible');
                  // Notifier l'utilisateur qu'une mise à jour est disponible
                  if (window.confirm('Une nouvelle version est disponible. Recharger ?')) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    window.location.reload();
                  }
                }
              });
            });
          })
          .catch(error => {
            console.error('❌ Erreur lors de l\'enregistrement du Service Worker :', error);
          });
      });
    }
  </script>
